    <script>
        const QUESTIONS_S1 = [{"id": 1, "q": "Em caso de conduta do Assessor de Investimentos (AI) que configure indĂ­cio de infraĂ§ĂŁo, a CVM deve ser avisada. Desta forma, podemos afirmar que a(o):", "options": ["Ancord deve avisar a CVM, em atĂ© 30 dias apĂłs sua fiscalizaĂ§ĂŁo mensal no qual teve conhecimento de condutas inadequadas do AI.", "credenciado possui 30 dias Ăşteis para recorrer a CVM quando descredenciado por penalidade.", "Responsabilidade da comunicaĂ§ĂŁo Ă  CVM Ă© da Ancord.", "Responsabilidade da comunicaĂ§ĂŁo Ă© da InstituiĂ§ĂŁo integrante do sistema de distribuiĂ§ĂŁo contratante do AI que cometeu a possĂ­vel infraĂ§ĂŁo."], "correct": 3}, {"id": 2, "q": "Segundo a ResoluĂ§ĂŁo CVM 178/23 (e suas atualizaĂ§Ăµes), que trata das atividades do Assessor de Investimentos (AI), a responsabilidade da fiscalizaĂ§ĂŁo dos AI que atuem como preposto de instituiĂ§ĂŁo integrante do sistema de distribuiĂ§ĂŁo de valores mobiliĂˇrios Ă© da(o):", "options": ["Ancord", "AI constituĂ­do como pessoa jurĂ­dica.", "ComissĂŁo de Valores MobiliĂˇrios.", "PrĂłprio intermediĂˇrio."], "correct": 3}, {"id": 3, "q": "Rafael e Guilherme sĂŁo irmĂŁos e ambos sĂŁo Assessores de Investimentos (AI) pessoas naturais, mas nĂŁo trabalham na mesma corretora (CTVM): Rafael Ă© vinculado a corretora ABCD e Guilherme trabalha para a corretora XYZ. Certo dia, um cliente de Rafael deseja realizar diversas operaĂ§Ăµes na bolsa de valores e para ganhar tempo, resolveu passar a sua senha do homebroker para que Rafael pudesse executar de forma mais Ăˇgil, jĂˇ que eles sĂŁo amigos de longa data. No entanto, Rafael necessitou levar seu filho urgentemente no mĂ©dico, nĂŁo podendo executar as operaĂ§Ăµes. Com isso, Rafael decide repassar a senha do cliente a seu irmĂŁo Guilherme, pedindo que o mesmo lhe ajude a transmitir as ordens diretamente pelo homebroker ou por seu sistema prĂłprio. Diante dessa situaĂ§ĂŁo, podemos afirmar que:", "options": ["Rafael nĂŁo pode usar a senha do cliente e tĂŁo pouco Guilherme, mas pode solicitar a seu irmĂŁo que transmita as ordens para sua corretora, afinal, Guilherme tambĂ©m Ă© um Al.", "Rafael pode usar a senha do cliente, pois foi o cliente que repassou, mas nĂŁo pode pedir a Guilherme que transmita as ordens porque o cliente nĂŁo o conhece.", "Rafael pode usar a senha do cliente, pois foi o cliente que repassou e por isso pode pedir a Guilherme para acessar tanto o homebroker, quanto encaminhar a ordem por seu sistema.", "Rafael nĂŁo pode usar a senha do cliente, tĂŁo pouco repassar a senha a Guilherme ou solicitar que o mesmo transmita as ordens para sua corretora."], "correct": 3}, {"id": 4, "q": "Constitui direito do Assessor de Investimento perante vĂ­nculo a intermediĂˇrio integrante do sistema de distribuiĂ§ĂŁo de valores mobiliĂˇrios com a qual tenha contrato:", "options": ["NĂŁo explicar seu vĂ­nculo com a InstituiĂ§ĂŁo.", "Delegar a terceiros a execuĂ§ĂŁo dos serviĂ§os objeto do contrato.", "Ser procurador de seus clientes.", "Agir como seu preposto."], "correct": 3}, {"id": 5, "q": "Considere as afirmativas abaixo: I â€“ Um assessor de Investimento pode exercer a funĂ§ĂŁo de consultor de valores mobiliĂˇrios. II â€“ Um assessor de Investimento pode exercer a funĂ§ĂŁo de administrador de carteira. III â€“ Um assessor de Investimento nĂŁo pode exercer a funĂ§ĂŁo de consultor de valores mobiliĂˇrios. IV â€“ Um assessor de Investimento nĂŁo pode exercer a funĂ§ĂŁo de administrador de carteira. EstĂŁo corretas APENAS as alternativas", "options": ["I e II", "I e III", "II e III", "III e IV"], "correct": 3}, {"id": 6, "q": "Preencha corretamente com uma das alternativas abaixo, respectivamente, as lacunas da seguinte frase: â€śO credenciamento para exercer a atividade de assessor de Investimento Ă© feita pela________, e o seu Registro Ă© concedido pela _______.â€ť", "options": ["B3 / BACEN", "ANCORD / CVM", "CVM / ANCORD", "BACEN / CVM"], "correct": 1}, {"id": 7, "q": "Independente da responsabilidade individual do assessor de Investimento, perante a CVM e as demais entidades competentes, a responsabilidade pelas atividades da sociedade a que pertence Ă©:", "options": ["do sĂłcio que responde a receita federal.", "de todos os sĂłcios.", "do sĂłcio majoritĂˇrio.", "dos sĂłcios que possuam mais de 25% do capital social."], "correct": 1}, {"id": 8, "q": "Caso um investidor pessoa fĂ­sica resolva contratar um Assessor de Investimentos (AI) para ajuda-lo conhecer melhor o mercado de capitais e melhorar seus investimentos, esse AI deve:", "options": ["NĂŁo aceitar ser contratado por esse investidor, pois nĂŁo lhe Ă© permitido.", "Prospectar e captar os melhores investimentos para seu contratante (investidor), pois essa Ă© uma das atividades do AI.", "Prestar todas as informaĂ§Ăµes sobre todos os produtos de investimentos e serviĂ§os que estĂˇ apto a oferecer ao investidor.", "Receber e registrar as ordens do seu contratante (investidor) e transmiti-las para o sistema de negociaĂ§ĂŁo."], "correct": 2}, {"id": 9, "q": "O Art. 5 da ResoluĂ§ĂŁo CVM 178/23 define Assessor de Investimento como uma pessoa natural. O Art. 6, da mesma resoluĂ§ĂŁo, define o assessor de Investimento pessoa jurĂ­dica. Analise as assertivas abaixo: I â€“ Para o credenciamento da Sociedade de AI, Ă© obrigatĂłrio que essa tenha como objeto social exclusivo, o exercĂ­cio da atividade de assessor de Investimento, sendo vedada a participaĂ§ĂŁo em outras sociedades. II â€“ Para o credenciamento da Sociedade de AI Ă© obrigatĂłrio que essa seja constituĂ­da como Sociedade AnĂ´nima, adotando qualquer uma das formas permitidas para tal, na forma da legislaĂ§ĂŁo em vigor. III â€“ Para o credenciamento da Sociedade de AI, Ă© obrigatĂłrio que essa sociedade tenha apenas sĂłcios AI pessoas naturais, as quais serĂˇ atribuĂ­do, o exercĂ­cio das atividades inerentes ao AI, dentre outras. EstĂŁo corretas as alternativas:", "options": ["I, apenas", "II e III, apenas.", "I, II e III.", "Nenhuma das anteriores."], "correct": 3}, {"id": 10, "q": "Para exercer atividade de administraĂ§ĂŁo de carteira, consultoria ou anĂˇlise de valores mobiliĂˇrios, o Assessor de Investimentos registrado pela CVM, deve requerer a Entidade Credenciadora:", "options": ["A suspensĂŁo do seu Registro.", "Cancelamento do seu Registro.", "Cancelamento do seu credenciamento.", "Requerimento para exame de qualificaĂ§ĂŁo."], "correct": 2}, {"id": 11, "q": "O Credenciamento de Assessor de Investimentos e das pessoas jurĂ­dicas por elas constituĂ­das Ă© feito:", "options": ["pela CVM.", "pela B3.", "por entidades autorizadas pela CVM.", "pela InstituiĂ§ĂŁo Contratante."], "correct": 2}, {"id": 12, "q": "O cancelamento do credenciamento do Assessor de Investimento Ă© condiĂ§ĂŁo para exercer as atividades de administraĂ§ĂŁo de carteira, de:", "options": ["Consultoria ou de anĂˇlise de valores mobiliĂˇrios.", "ProspecĂ§ĂŁo e captaĂ§ĂŁo de clientes ou de anĂˇlise de valores mobiliĂˇrios.", "Consultoria ou anĂˇlise de ordens para os sistemas de negociaĂ§ĂŁo.", "ProspecĂ§ĂŁo e captaĂ§ĂŁo de clientes ou de registro de ordens para o sistema de negociaĂ§ĂŁo."], "correct": 0}, {"id": 13, "q": "O recurso recuperado nos casos de Lavagem de Dinheiro Ă© destinado:", "options": ["em um primeiro momento Ă  uma conta remunerada na CEF ou outra instituiĂ§ĂŁo financeira pĂşblica, atravĂ©s de depĂłsito judicial quando trata-se de processos de competĂŞncia da JustiĂ§a Federal e da JustiĂ§a do Distrito Federal.", "O recurso fica disponĂ­vel em conta do Estado para que seja utilizado como investimentos para combate Ă  prevenĂ§ĂŁo de Lavagem de dinheiro de acordo com determinaĂ§ĂŁo do Bacen.", "As operaĂ§Ăµes relativas a pagamentos, recebimentos e transferĂŞncias de recursos, por meio de qualquer instrumento, contra pagamento em espĂ©cie, de valor igual ou superior a R$ 50.000,00 (cinquenta mil reais) serĂŁo devolvidas diretamente ao tesouro nacional.", "As instituiĂ§Ăµes financeiras deverĂŁo identificar seus clientes, representantes e manter cada         function getQuestions() {
            return activeTab === 1 ? QUESTIONS_S1 : QUESTIONS_S2;

        function storageKey() {

        function loadSaved() {
            try {
                return JSON.parse(localStorage.getItem(storageKey()) || "{}");
            } catch (e) {
                return {};
            }
        }

        function loadTimerState() {
            try {
                return JSON.parse(localStorage.getItem(TIMER_STORAGE) || "{}");
            } catch (e) {
                return {};
            }
        }

        function saveTimerState(state) {
            localStorage.setItem(TIMER_STORAGE, JSON.stringify(state));
        }

        function getTimerSlot() {
            const st = loadTimerState();
            const tab = String(activeTab);
            if (!st[tab]) st[tab] = { startAt: null, durationSec: EXAM_DURATION_SEC[activeTab] };
            return st;
        }

        function formatRemain(sec) {
            sec = Math.max(0, Math.floor(sec));
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            if (h > 0)
                return (
                    h +
                    ":" +
                    String(m).padStart(2, "0") +
                    ":" +
                    String(s).padStart(2, "0")
                );
            return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        }

        function updateTimerUI() {
            const st = getTimerSlot();
            const tab = String(activeTab);
            const slot = st[tab] || {};
            const dur = slot.durationSec ?? EXAM_DURATION_SEC[activeTab];
            if (activeTab === 1) {
                timerCaption.textContent = "Prova ANCORD oficial Â· 2 h 30 min (" + getQuestions().length + " questĂµes)";
            } else {
                timerCaption.textContent =
                    "Ritmo equivalente Ă  prova Â· " +
                    Math.round(dur / 60) +
                    " min (" +
                    getQuestions().length +
                    " questĂµes)";
            }
            if (!slot.startAt) {
                timerDisplay.textContent = formatRemain(dur);
                timerStartBtn.textContent = "Iniciar";
                scorePanelEl.classList.remove("timer-expired");
                return;
            }
            const elapsed = (Date.now() - slot.startAt) / 1000;
            const left = dur - elapsed;
            timerDisplay.textContent = formatRemain(left);
            timerStartBtn.textContent = "Em andamento";
            if (left <= 0) scorePanelEl.classList.add("timer-expired");
            else scorePanelEl.classList.remove("timer-expired");
        }

        let timerInterval = null;
        function ensureTimerTick() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimerUI, 1000);
        }

        function saveAnswer(qId, optionIdx) {
            const data = loadSaved();
            data[qId] = optionIdx;
            localStorage.setItem(storageKey(), JSON.stringify(data));
            updateScore();
            renderHints();
        }

        function updateScore() {
            const questions = getQuestions();
            const data = loadSaved();
            let hits = 0, wrong = 0, answered = 0;
            questions.forEach((item) => {
                const sel = data[item.id];
                if (sel === undefined || sel === null) return;
                answered++;
                if (sel === item.correct) hits++;
                else wrong++;
            });
            hitsEl.textContent = hits;
            wrongEl.textContent = wrong;
            answeredEl.textContent = answered;
            const rate = answered ? Math.round((hits / answered) * 1000) / 10 : 0;
            pctEl.textContent = rate + "%";
            const rateTotal = Math.round((hits / questions.length) * 1000) / 10;
            pctTotalEl.textContent = rateTotal + "%";
            partialLabel.textContent = "Parcial sobre " + questions.length + " questĂµes";
            progressBar.style.width = (answered / questions.length * 100) + "%";
        }

        function renderHints() {
            const questions = getQuestions();
            const data = loadSaved();
            questions.forEach((item) => {
                const sel = data[item.id];
                const nOpt = item.options.length;
                for (let o = 0; o < nOpt; o++) {
                    const lab = document.getElementById(
                        "label-" + activeTab + "-" + item.id + "-" + o
                    );
                    if (!lab) continue;
                    lab.classList.remove("correct", "wrong", "reveal-correct");
                }
                const wrongBox = document.getElementById("wrong-" + activeTab + "-" + item.id);
                if (wrongBox) {
                    if (sel === undefined || sel === null || sel === item.correct) {
                        wrongBox.hidden = true;
                    } else {
                        wrongBox.hidden = false;
                    }
                }
                if (sel === undefined || sel === null) return;
                for (let o = 0; o < nOpt; o++) {
                    const lab = document.getElementById(
                        "label-" + activeTab + "-" + item.id + "-" + o
                    );
                    if (!lab) continue;
                    if (o === sel) {
                        lab.classList.add(o === item.correct ? "correct" : "wrong");
                    }
                    if (sel !== item.correct && o === item.correct) {
                        lab.classList.add("reveal-correct");
                    }
                }
            });
        }

                    inp.type = "radio";
                    inp.name = "quiz" + activeTab + "-q-" + item.id;
                    inp.value = String(oIdx);
                    if (data[item.id] === oIdx) inp.checked = true;
                    inp.addEventListener("change", () => saveAnswer(item.id, oIdx));
                    const span = document.createElement("span");
                    span.className = "opt-text";
                    span.textContent = String.fromCharCode(65 + oIdx) + ") " + opt;
                    lab.appendChild(inp);
                    lab.appendChild(span);
                    opts.appendChild(lab);
                });
                card.appendChild(opts);

                const footer = document.createElement("div");
                footer.className = "q-footer";
                const cLet = String.fromCharCode(65 + item.correct);
                const cText = item.options[item.correct];
                const wrongReveal = document.createElement("div");
                wrongReveal.className = "wrong-reveal";
                wrongReveal.id = "wrong-" + activeTab + "-" + item.id;
                const wrStrong = document.createElement("strong");
                wrStrong.textContent = "Resposta correta:";
                wrongReveal.appendChild(wrStrong);
                wrongReveal.appendChild(document.createTextNode(" "));
                wrongReveal.appendChild(
                    document.createTextNode(cLet + ") " + cText)
                );
                if (activeTab === 2 && item.justificationText) {
                    const jt = document.createElement("div");
                    jt.className = "justification-text";
                    jt.textContent = item.justificationText;
                    wrongReveal.appendChild(jt);
                }
                wrongReveal.hidden = true;
                footer.appendChild(wrongReveal);

                card.appendChild(footer);
                container.appendChild(card);
            });
            document.getElementById("hdr-title").textContent = META[activeTab].title;
            document.getElementById("hdr-desc").textContent = META[activeTab].desc;
            updateScore();
            renderHints();
            updateTimerUI();
        }

        document.querySelectorAll(".tab-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
                const t = parseInt(btn.getAttribute("data-tab"), 10);
                if (t === activeTab) return;
                activeTab = t;
                document.querySelectorAll(".tab-btn").forEach((b) =>
                    b.classList.toggle("active", parseInt(b.getAttribute("data-tab"), 10) === activeTab)
                );
                initQuiz();
            });
        });

        timerStartBtn.addEventListener("click", () => {
            const st = getTimerSlot();
            const tab = String(activeTab);
            const slot = st[tab] || {};
            if (slot.startAt) return;
            slot.durationSec = EXAM_DURATION_SEC[activeTab];
            slot.startAt = Date.now();
            st[tab] = slot;
            saveTimerState(st);
            updateTimerUI();
        });

        timerResetBtn.addEventListener("click", () => {
            if (!confirm("Zerar o timer desta aba? O cronĂ´metro volta ao tempo integral e para de contar atĂ© vocĂŞ iniciar de novo.")) return;
            const st = loadTimerState();
            const tab = String(activeTab);
            st[tab] = { startAt: null, durationSec: EXAM_DURATION_SEC[activeTab] };
            saveTimerState(st);
            updateTimerUI();
        });

        document.getElementById("btn-clear").addEventListener("click", () => {
            if (confirm("Limpar todas as respostas desta aba neste dispositivo?")) {
                localStorage.removeItem(storageKey());
                initQuiz();
            }
        });

        ensureTimerTick();
        initQuiz();
    </script>
</body>
</html>
